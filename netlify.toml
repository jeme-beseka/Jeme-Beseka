# netlify.toml — Jeme Beseka Foncham Personal Site
# No build step needed — pure static HTML/CSS/JS

[build]
publish = "."

# ─── HEADERS — Security & Performance ───────────────────────────
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

# ─── REDIRECTS ───────────────────────────────────────────────────
# Force HTTPS (handled by Netlify automatically, but explicit is better)
[[redirects]]
from = "http://jemebeseka.com/*"
to   = "https://jemebeseka.com/:splat"
status = 301
force = true

# www → non-www
[[redirects]]
from = "https://www.jemebeseka.com/*"
to   = "https://jemebeseka.com/:splat"
status = 301
force = true

# 404 fallback
[[redirects]]
from   = "/*"
to     = "/404.html"
status = 404